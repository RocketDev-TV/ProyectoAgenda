<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{fragments/layout :: head('Agregar Medio')}">
</head>

<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">

            <!-- Breadcrumb -->
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb small">
                    <li class="breadcrumb-item">
                        <a th:href="@{/contacts}" class="text-brand text-decoration-none">Contactos</a>
                    </li>
                    <li class="breadcrumb-item">
                        <a th:href="@{/contacts/{id}/media(id=${idContact})}"
                           class="text-brand text-decoration-none">Medios</a>
                    </li>
                    <li class="breadcrumb-item active">Agregar</li>
                </ol>
            </nav>

            <div class="card">
                <div class="card-header">
                    <h5><i class="bi bi-plus-circle-fill me-2"></i>Agregar Medio de Contacto</h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/contacts/{id}/media(id=${idContact})}"
                          th:object="${registerContactMediumDto}"
                          method="POST">

                        <!-- Tipo -->
                        <div class="mb-4">
                            <label for="idType" class="form-label">
                                <i class="bi bi-tag text-brand me-1"></i>Tipo de Medio *
                            </label>
                            <select id="idType"
                                    th:field="*{idType}"
                                    class="form-select"
                                    th:classappend="${#fields.hasErrors('idType')} ? ' is-invalid'"
                                    required>
                                <option value="" disabled selected>— Selecciona un tipo —</option>
                                <option th:each="t : ${types}"
                                        th:value="${t.id}"
                                        th:text="${t.name}">Tipo</option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('idType')}"
                                 th:errors="*{idType}"></div>
                        </div>

                        <!-- Valor -->
                        <div class="mb-4">
                            <label for="value" class="form-label">
                                <i class="bi bi-input-cursor-text text-brand me-1"></i>Valor *
                            </label>
                            <input type="text" id="value"
                                   th:field="*{value}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('value')} ? ' is-invalid'"
                                   placeholder="ej. correo@email.com ó 5512345678"/>
                            <div class="form-text text-muted">
                                <i class="bi bi-info-circle me-1"></i>
                                Ingresa un correo válido o un número de 10 dígitos.
                            </div>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('value')}"
                                 th:errors="*{value}"></div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-brand px-4">
                                <i class="bi bi-floppy me-2"></i>Guardar Medio
                            </button>
                            <a th:href="@{/contacts/{id}/media(id=${idContact})}"
                               class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg me-1"></i>Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
