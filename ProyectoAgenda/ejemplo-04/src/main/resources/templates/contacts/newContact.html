<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio - Mi Proyecto MVC</title>
</head>
<body>
<h1>Registro de nuevo contacto</h1>

<!-- Thymeleaf reemplaza este texto con el valor de la variable 'mensaje' -->

<form th:action="@{/contacts}" th:object="${registerContactDto}" method="POST">
    <div>
        <label>Nombre:</label>
        <input type="text" th:field="*{name}" />
        <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red;"></p>
    </div>
    <div>
        <label>Primer apellido:</label>
        <input type="text" th:field="*{lastName}" />
        <p th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" style="color:red;"></p>
    </div>
    <div>
        <label>Segundo apellido:</label>
        <input type="text" th:field="*{secondLastName}" />
        <p th:if="${#fields.hasErrors('secondLastName')}" th:errors="*{secondLastName}" style="color:red;"></p>
    </div>
    <div>
        <label>Apodo:</label>
        <input type="text" th:field="*{nickName}" />
        <p th:if="${#fields.hasErrors('nickName')}" th:errors="*{nickName}" style="color:red;"></p>
    </div>
    <br>
    <button type="submit">Guardar contacto</button>
</form>
<a th:href="@{/contacts}">Cancelar</a>
</body>
</html>
