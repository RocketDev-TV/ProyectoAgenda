<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio - Mi Proyecto MVC</title>
</head>
<body>
<h1>Página de Inicio</h1>

<!-- Thymeleaf reemplaza este texto con el valor de la variable 'mensaje' -->
<p th:text="${mensaje}">Texto por defecto si el servidor está apagado</p>
<p th:text="${messageConfirmacion}">Texto por defecto para el registro de un usuario</p>

<form th:action="@{/}" th:object="${usuarioDto}" method="POST">
    <div>
        <label>Usuario:</label>
        <input type="text" th:field="*{username}" />
        <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" style="color:red;"></p>
    </div>
    <div>
        <label>Contraseña:</label>
        <input type="password" th:field="*{password}" />
        <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:red;"></p>
    </div>
    <br>
    <button type="submit">Enviar</button>
</form>
<a th:href="@{/register/new}">Registrarte</a>
</body>
</html>
