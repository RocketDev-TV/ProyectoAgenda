<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio - Mi Proyecto MVC</title>
</head>
<body>
<h1>Gestión de usuarios</h1>
<table>
    <thead>
    <tr>
        <!--<th>ID</th>-->
        <th>Nombre</th>
        <th>Primer Apellido</th>
        <th>Segundo Apellido</th>
        <th>Usuario (Username)</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <!-- th:each se encarga de repetir este <tr> por cada persona en la lista -->
    <tr th:each="persona : ${personas}">
        <!--<td th:text="${persona.id}">1</td>-->
        <td th:text="${persona.name}">Juan</td>
        <td th:text="${persona.lastName}">Pérez</td>
        <td th:text="${persona.secondLastName}">Gómez</td>
        <td th:text="${persona.username}">juanpg</td>
        <td><a th:href="@{/users/{id}/edit(id=${persona.id})}">Editar</a><a th:href="@{/users/{id}/destroy(id=${persona.id})}">Eliminar</a></td>
    </tr>
    </tbody>
</table>
<a th:href="@{/register/new}">Registrarte</a>
</body>
</html>
